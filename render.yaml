services:
  - type: web
    name: convex-datatable-demo
    runtime: static
    buildCommand: curl -fsSL https://bun.sh/install | bash && export BUN_INSTALL="$HOME/.bun" && export PATH="$BUN_INSTALL/bin:$PATH" && bun install --frozen-lockfile && if [ -n "$CONVEX_DEPLOY_KEY" ]; then cd apps/demo && if [ "$IS_PULL_REQUEST" = "true" ]; then bunx convex deploy --preview-create "$RENDER_GIT_BRANCH" --cmd-url-env-var-name VITE_CONVEX_URL --cmd 'cd ../.. && bun run build'; else bunx convex deploy --cmd-url-env-var-name VITE_CONVEX_URL --cmd 'cd ../.. && bun run build'; fi; else bun run build; fi
    staticPublishPath: apps/demo/dist
    envVars:
      - key: CONVEX_DEPLOY_KEY
        sync: false
    previews:
      generation: automatic
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
