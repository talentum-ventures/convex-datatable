services:
  - type: web
    name: convex-datatable-demo
    runtime: static
    buildCommand: curl -fsSL https://bun.sh/install | bash && export BUN_INSTALL="$HOME/.bun" && export PATH="$BUN_INSTALL/bin:$PATH" && bun install --frozen-lockfile && bun run build
    staticPublishPath: apps/demo/dist
    previews:
      generation: automatic
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
